name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.5.0). Must already exist on the branch.'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN_NAME: bayesian-ssh

jobs:
  # ── 1 ▸ Build one binary per platform ──────────────────────────────────────
  build:
    name: Build ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_name: linux
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          mkdir -p dist
          ASSET="${BIN_NAME}-${{ matrix.os_name }}-${{ matrix.arch }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${ASSET}"
          chmod +x "dist/${ASSET}"

          # Compressed archive alongside the raw binary
          tar -C dist -czf "dist/${ASSET}.tar.gz" "${ASSET}"

          # Per-asset checksum (combined SHA256SUMS is built in the release job)
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${ASSET}" "${ASSET}.tar.gz") > "dist/${ASSET}.sha256"
          else
            (cd dist && shasum -a 256 "${ASSET}" "${ASSET}.tar.gz") > "dist/${ASSET}.sha256"
          fi

          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.asset }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ── 2 ▸ Create GitHub Release with all assets ──────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag and version
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts and produce SHA256SUMS
        shell: bash
        run: |
          mkdir -p release
          # Copy binaries and archives; skip the per-asset .sha256 files
          find artifacts -type f \( -name "${BIN_NAME}-*" \) ! -name "*.sha256" \
            -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "--- release assets ---"
          ls -lh

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES="$(mktemp)"
          if [ -f CHANGELOG.md ] && grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            awk -v ver="${VERSION}" '
              $0 ~ ("^## \\[" ver "\\]") { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES"
          else
            echo "Release ${VERSION}." > "$NOTES"
          fi
          {
            echo "## Bayesian SSH ${VERSION}"
            echo
            cat "$NOTES"
            echo
            echo "---"
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo
            echo "### Verify checksums"
            echo
            echo '```bash'
            echo "sha256sum -c SHA256SUMS"
            echo '```'
          } > release_notes.md
          echo "path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Bayesian SSH ${{ steps.tag.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          files: release/*
          fail_on_unmatched_files: true
